---
layout: default
---
<div class="layout">
  {% include sidebar.html %}

  <main class="content">
    {% if page.is_category %}
      <div class="placeholder">
        <p>왼쪽 트리에서 문서를 선택하세요.</p>
        {% if page.title %}<p class="placeholder-cat">{{ page.title }}</p>{% endif %}
      </div>
    {% else %}
      <article class="doc">
        <h1 class="doc-title">{{ page.title }}</h1>
        {% if page.breadcrumb and page.breadcrumb != "" %}
          <p class="doc-path">{{ page.breadcrumb }}</p>
        {% endif %}
        <div class="doc-body">
          {{ content }}
        </div>
      </article>
    {% endif %}
  </main>
</div>
